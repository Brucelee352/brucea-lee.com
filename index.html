<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bruce Lee — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-indigo:        #4F46E5;
      --color-indigo-dark:   #4338CA;
      --color-indigo-light:  #EEF2FF;
      --color-indigo-muted:  #C7D2FE;
      --color-pill-bg:       #E0E7FF;
      --color-white:         #FFFFFF;
      --color-heading:       #1E1B4B;
      --color-body:          #374151;
      --color-muted:         #6B7280;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #EEF2FF 0%, #FFFFFF 55%, #F5F3FF 100%);
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--color-body);
      -webkit-font-smoothing: antialiased;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script>
    const { useState, createElement: h } = React;

    const c = {
      accent:        "#4F46E5",
      accentHov:     "#4338CA",
      pillBg:        "#E0E7FF",
      pillText:      "#4F46E5",
      cardBg:        "#FFFFFF",
      cardBorder:    "#C7D2FE",
      heading:       "#1E1B4B",
      body:          "#374151",
      muted:         "#6B7280",
      white:         "#FFFFFF",
    };

    const s = {
      page: {
        minHeight: "100vh",
        display: "flex",
        flexDirection: "column",
        alignItems: "center",
        padding: "0 1.5rem",
      },
      hero: {
        maxWidth: "680px",
        width: "100%",
        textAlign: "center",
        padding: "5rem 0 3rem",
        animation: "fadeUp 0.5s ease both",
      },
      heroName: {
        fontSize: "clamp(2rem, 5vw, 2.5rem)",
        fontWeight: 700,
        color: c.heading,
        letterSpacing: "-0.01em",
        marginBottom: "0.75rem",
      },
      heroTagline: {
        fontSize: "1.125rem",
        color: c.muted,
        lineHeight: 1.7,
      },
      cards: {
        display: "flex",
        flexWrap: "wrap",
        gap: "1.5rem",
        justifyContent: "center",
        maxWidth: "680px",
        width: "100%",
        animation: "fadeUp 0.5s ease 0.15s both",
      },
      card: {
        backgroundColor: c.cardBg,
        border: "1px solid " + c.cardBorder,
        borderRadius: "16px",
        padding: "2rem",
        minWidth: "260px",
        maxWidth: "300px",
        boxShadow: "0 2px 12px rgba(79, 70, 229, 0.10)",
        transition: "box-shadow 0.2s ease, transform 0.2s ease",
        display: "flex",
        flexDirection: "column",
        alignItems: "flex-start",
        gap: "0.75rem",
      },
      cardHov: {
        boxShadow: "0 6px 24px rgba(79, 70, 229, 0.20)",
        transform: "translateY(-3px)",
      },
      label: {
        fontSize: "0.75rem",
        fontWeight: 600,
        letterSpacing: "0.06em",
        textTransform: "uppercase",
        color: c.pillText,
        backgroundColor: c.pillBg,
        borderRadius: "9999px",
        padding: "0.2rem 0.65rem",
      },
      cardTitle: {
        fontSize: "1.125rem",
        fontWeight: 600,
        color: c.heading,
      },
      cardDesc: {
        fontSize: "0.9375rem",
        color: c.body,
        lineHeight: 1.6,
        flexGrow: 1,
      },
      btn: {
        display: "inline-flex",
        alignItems: "center",
        gap: "0.3rem",
        backgroundColor: c.accent,
        color: c.white,
        border: "none",
        borderRadius: "9999px",
        padding: "0.625rem 1.5rem",
        fontSize: "0.9375rem",
        fontWeight: 600,
        cursor: "pointer",
        textDecoration: "none",
        boxShadow: "0 2px 8px rgba(79, 70, 229, 0.25)",
        transition: "background-color 0.18s ease, box-shadow 0.18s ease, transform 0.15s ease",
        marginTop: "auto",
      },
      btnHov: {
        backgroundColor: c.accentHov,
        boxShadow: "0 4px 16px rgba(79, 70, 229, 0.35)",
        transform: "translateY(-1px)",
      },
      footer: {
        marginTop: "3rem",
        marginBottom: "2rem",
        fontSize: "0.8125rem",
        color: "#9CA3AF",
        animation: "fadeUp 0.5s ease 0.3s both",
      },
    };

    const linkStyle = {
      fontSize: "14px",
      color: "#4F46E5",
      display: "flex",
      flexDirection: "row",
      marginBottom: "10px",
      textDecoration: "none",
    };

    function ProjectButton({ href, children }) {
      const [hov, setHov] = useState(false);
      return h('a', {
        href: href,
        style: Object.assign({}, s.btn, hov ? s.btnHov : {}),
        onMouseEnter: () => setHov(true),
        onMouseLeave: () => setHov(false),
      },
        children, ' ',
        h('span', { 'aria-hidden': 'true' }, '→')
      );
    }

    function ProjectCard({ label, title, description, href }) {
      const [hov, setHov] = useState(false);
      return h('div', {
        style: Object.assign({}, s.card, hov ? s.cardHov : {}),
        onMouseEnter: () => setHov(true),
        onMouseLeave: () => setHov(false),
      },
        label && h('span', { style: s.label }, label),
        h('h2', { style: s.cardTitle }, title),
        h('p', { style: s.cardDesc }, description),
        h(ProjectButton, { href: href }, 'View')
      );
    }

    const projects = [
      {
        label: "Health Analytics",
        title: "Mental Health Dashboard",
        description: "Analytics exploring ACA insurance offerings that feature mental health coverage between several Florida counties.",
        href: "https://aca.brucea-lee.com",
      },
      {
        label: "Labor Economics",
        title: "BLS Underemployment Tracker",
        description: "Data-driven visualizations of underemployment trends and workforce utilization metrics using CPS microdata.",
        href: "https://emp.brucea-lee.com",
      },
      {
        label: "Product Analytics",
        title: "Kroger Product Analysis",
        description: "A deep-dive into Kroger's product and fulfillment data, supplemented by their public API.",
        href: "https://kro.brucea-lee.com",
      },
      {
        label: "Misc.",
        title: "Legacy Projects",
        description: "An older version of my portfolio with all of my legacy projects in R and Python.",
        href: "https://brucelee352.github.io/",
      },
    ];

    function App() {
      return h('div', { style: s.page },
        h('header', { style: s.hero },
          h('h1', { style: s.heroName }, 'Bruce A. Lee'),
          h('p', { style: s.heroTagline }, 'Analytics Engineer, please select a project below:'),
          h('hr', { style: { margin: "14px 0", border: "none", borderTop: "1px solid #C7D2FE" } }),
          h('p', { style: { fontWeight: 600, fontSize: "18px", color: "#1E1B4B", marginBottom: "12px" } }, 'Connect:'),
          h('div', { style: { display: "flex", gap: "2rem", justifyContent: "center" } },
            h('div', null,
              h('a', { href: "https://github.com/brucelee352", target: "_blank", rel: "noopener noreferrer", style: linkStyle }, 'GitHub'),
              h('a', { href: "https://linkedin.com/in/brucealee", target: "_blank", rel: "noopener noreferrer", style: linkStyle }, 'LinkedIn')
            ),
            h('div', null,
              h('a', { href: "https://github.com/Brucelee352/marketplace_pipeline/blob/master/misc/BruceLee_2026Resume_b.pdf", target: "_blank", rel: "noopener noreferrer", style: linkStyle }, 'Resume'),
              h('a', { href: "mailto:brucelee352@gmail.com", style: linkStyle }, 'Email')
            )
          )
        ),
        h('main', { style: s.cards },
          projects.map((p) => h(ProjectCard, { key: p.title, label: p.label, title: p.title, description: p.description, href: p.href }))
        ),
        h('footer', { style: s.footer },
          '© ' + new Date().getFullYear() + ' Bruce Lee'
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(h(App, null));
  </script>
</body>
</html>
